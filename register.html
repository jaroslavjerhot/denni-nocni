<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>denní|noční - Registrace</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="css/style.css"
        rel="stylesheet">

</head>

<body>

<div class="container-fluid page-container">

    <div class="row justify-content-center">

        <div class="col-12 col-xl-10">

            <div class="card card-auth p-4 p-md-5">

                <h2 class="text-center mb-4">
                    denní|noční - Registrace
                </h2>

                <!-- EMAIL -->
                <div class="section-title">Email</div>
                <div class="row mb-3">

                    <div class="col-12">

                        <!-- <label class="form-label">Email</label> -->
                        <input id="email" type="email" class="form-control" placeholder="name@vfn.cz" value="jana.test2@vfn.cz">
                        <div class="form-text">Email musí být ve formátu @vfn.cz.</div>

                    </div>

                </div>
                <!-- PASSWORD -->

                <div class="section-title">Heslo</div>

                <div class="row g-2 mb-4">

                    <div class="col-12 col-md-6">
                      <!-- <label class="form-label">Heslo</label> -->
                      <input id="password" type="password" class="form-control" placeholder="Heslo" value="test1234">
                    </div>

                    <div class="col-12 col-md-6">
                        <!-- <label class="form-label">Heslo znovu</label> -->
                        <input id="password2" type="password" class="form-control" placeholder="Heslo znovu" value="test1234">          
                    </div>

                </div>

                <!-- NAME -->

                <div class="row g-2 mb-3">

                    <div class="col-12 col-md-2">

                        <!-- <label class="form-label">
                            Prefix
                        </label> -->

                        <input
                            id="prefix"
                            class="form-control"
                            placeholder="Titul před jménem">

                    </div>

                    <div class="col-12 col-md-4">

                        <!-- <label class="form-label">
                            Given name
                        </label> -->

                        <input
                            id="givenname"
                            class="form-control"
                            placeholder="Jméno">

                    </div>

                    <div class="col-12 col-md-4">

                        <!-- <label class="form-label">
                            Surname
                        </label> -->

                        <input
                            id="surname"
                            class="form-control"
                            placeholder="Příjmení">

                    </div>

                    <div class="col-12 col-md-2">

                        <!-- <label class="form-label">
                            Suffix
                        </label> -->

                        <input
                            id="suffix"
                            class="form-control"
                            placeholder="Titul za jménem">

                    </div>

                </div>

                <!-- PHONE -->

                <div class="row mb-3">

                    <div class="col-12">

                        <!-- <label class="form-label">
                            Telefonní číslo
                        </label> -->

                        <input
                            id="phone"
                            class="form-control"
                            placeholder="Telefonní číslo">

                    </div>

                </div>
                <!-- shortname -->

                <div class="row mb-3">

                    <div class="col-12">

                        <!-- <label class="form-label">
                            Shortname
                        </label> -->

                        <input
                            id="shortname"
                            class="form-control"
                            placeholder="Zkrácené jméno pro kolegy">

                    </div>

                </div>

                <!-- POSITION -->

                <div class="row mb-3">

                    <div class="col-12">

                        <!-- <label class="form-label">
                            Position
                        </label> -->

                        <select id="position" class="form-select">

                            <option value="">Vyberte pracovní pozici</option>
                            <option value="doctor">Lékař/ka</option>
                            <option value="head_nurse">Vrchní sestra</option>
                            <option value="dept_nurse">Staniční sestra</option>
                            <option value="midwife">Porodní asistentka</option>                            
                            <option value="nurse">Sestra</option>                            
                            <option value="other">Jiné</option>

                        </select>

                    </div>

                </div>

                <!-- UNFAVORITE -->

                <div class="section-title">Neoblíbení kolegové/yně (nebudou se vám zobrazovat v rozpisu)</div>
                

                <div class="row g-2">

                    <div class="col-12 col-md-6">
                        <select id="unfavorite1" class="form-select">
                            <option value="">Kolega/yně 1</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <select id="unfavorite2" class="form-select">
                            <option value="">Kolega/yně 2</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <select id="unfavorite3" class="form-select">
                            <option value="">Kolega/yně 3</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <select id="unfavorite4" class="form-select">
                            <option value="">Kolega/yně 4</option>
                        </select>
                    </div>

                    <!-- <div class="col-12">
                        <select id="unfavorite5" class="form-select">
                            <option value="">Kolega/yně 5</option>
                        </select>
                    </div>
                    
                    <div class="col-12">
                        <select id="unfavorite6" class="form-select">
                            <option value="">Kolega/yně 6</option>
                        </select>
                    </div> -->

                </div>

                
                <!-- BUTTONS -->
<div class="row mb-3">  </div>
                <div class="row g-2">
                    <div class="col-12 col-md-6">

                        <button
                            type="button" class="btn btn-royal w-100" onclick="registerUser()">
                            Registrovat se
                        </button>

                    </div>

                    <div class="col-12 col-md-6">
                        <a href="index.html" class="btn btn-outline-success w-100">
                            Zpět na přihlášení
                        </a>

                    </div>

                </div>

                <div
                    id="msg"
                    class="text-center mt-3">
                </div>

            </div>

        </div>

    </div>

</div>

<script
    type="module"
    src="js/register.js">
</script>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
