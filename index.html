<!DOCTYPE html>
<html>

<head>
  
  <link rel="icon" href="img/favicon_letter_32.png" type="image/png"    >
  <meta charset="UTF-8">
  <title>denní|noční</title>
  <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
>

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <!-- logo % of width, center, margin-bottom -->
<div class="container d-flex align-items-center" style="height:200px;">
  <img src="img/logo_desktop_40.png" class="card-img-top w-25 mx-auto mb-4" alt="Logo">
</div>
<div class="container d-flex align-items-center">
  <div class="card p-4 w-100">

    <h2 class="text-center mb-4">Přihlášení</h2>

    <input
      id="email"
      class="form-control mb-3"
      placeholder="Email"
    >

    <input
      id="password"
      class="form-control mb-3"
      type="password"
      placeholder="Heslo"
    >

    <button class="btn btn-royal w-100 mb-2" onclick="login()">
      Přihlásit se
    </button>

    <a class="btn btn-outline-success w-100 mb-2" href="register.html">
      Registrovat se (pouze ...@vfn.cz)
    </a>

    <!-- <button class="btn btn-gold w-100 mb-2" onclick="googleLogin()">
      Pokračovat s Google
    </button> -->

    <button class="btn btn-link text-success w-100" onclick="resetPassword()">
      Zapomenuté heslo
    </button>

    <div id="msg" class="text-danger text-center"></div>

  </div>
</div>

<script type="module" src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
