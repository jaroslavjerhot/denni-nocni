<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <title>Login</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

<div class="card">

  <h2>Login</h2>

  <input
    id="email"
    placeholder="Email"
  >

  <input
    id="password"
    type="password"
    placeholder="Password"
  >

  <button onclick="login()">
    Login
  </button>

  <button onclick="signup()">
    Sign Up
  </button>

  <button onclick="googleLogin()">
    Continue with Google
  </button>

  <button onclick="resetPassword()">
    Reset Password
  </button>

  <div id="msg"></div>

</div>

<script
  type="module"
  src="js/auth.js"
></script>

</body>
</html>
