<!DOCTYPE html>
<html>

<head>
  
  <link rel="icon" href="img/favicon_letter_32.png" type="image/png"    >
  <meta charset="UTF-8">
  <title>denní|noční</title>
  <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
>

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <!-- logo % of width, center, margin-bottom -->
<div class="container d-flex align-items-center" style="height:60px;">
  <!-- <img src="img/logo_desktop_40.png" class="card-img-top w-25 mx-auto mb-4" alt="Logo"> -->
</div>
<div class="container d-flex align-items-center">
  <div class="card p-4 w-100" style="max-width:760px;">

    <h2 class="text-center mb-4">denní|noční: Registrace</h2>

    <div class="mb-3">
      <input id="email" class="form-control" placeholder="Email">
      <div class="form-text">Jsou povoleny pouze emailové adresy @vfn.cz.</div>
    </div>

    <div class="row mb-3">
      <div class="col-md-2 mb-2">
        <input id="prefix" class="form-control" placeholder="Titul před">
      </div>
      <div class="col-md-4 mb-2">
        <input id="givenname" class="form-control" placeholder="Jméno">
      </div>
      <div class="col-md-4 mb-2">
        <input id="surname" class="form-control" placeholder="Příjmení">
      </div>
      <div class="col-md-2 mb-2">
        <input id="suffix" class="form-control" placeholder="Titul za">
      </div>
    </div>

    <div class="mb-3 col-md-6">
      <input id="shortname" class="form-control" placeholder="Zkrácené jméno">
    </div>

    <div class="mb-3 col-md-6">
      <input id="phone" class="form-control" placeholder="Telefonní číslo">
    </div>
    
    <div class="mb-3">
      <select id="position" class="form-select">
        <option value="">Pracovní zařazení</option>
        <option value="doctor">Lékař/ka</option>
        <option value="head_nurse">Vrchní sestra</option>
        <option value="dept_nurse">Staniční sestra</option>
        <option value="midwife">Porodní asistentka</option>
        <option value="nurse">Sestra</option>
        <option value="admin">Administrátor/ka</option>
        <option value="other">Jiné</option>
      </select>
    </div>

    <h5 class="mt-4">Neoblíbení</h5>

    <select id="unfavorite1" class="form-select mb-2">
      <option value="">Neoblíbený 1</option>
    </select>

    <select id="unfavorite2" class="form-select mb-2">
      <option value="">Neoblíbený 2</option>
    </select>

    <select id="unfavorite3" class="form-select mb-2">
      <option value="">Neoblíbený 3</option>
    </select>

    <select id="unfavorite4" class="form-select mb-2">
      <option value="">Neoblíbený 4</option>
    </select>

    <select id="unfavorite5" class="form-select mb-3">
      <option value="">Neoblíbený 5</option>
    </select>

    <div class="row mb-3">
      <div class="col-md-6 mb-2">
        <input id="password" type="password" class="form-control" placeholder="Heslo">
      </div>
      <div class="col-md-6 mb-2">
        <input id="password2" type="password" class="form-control" placeholder="Opakujte heslo">
      </div>
    </div>

    <button class="btn btn-royal w-100 mb-2" onclick="registerUser()">
      Registrovat se
    </button>

    <a class="btn btn-link text-success w-100" href="index.html">
      Zpět na přihlášení
    </a>

    <div id="msg" class="text-center mt-3"></div>

  </div>
</div>

<script type="module" src="js/register.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
