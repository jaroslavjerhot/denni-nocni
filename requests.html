<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Shift Requests</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link href="css/style.css" rel="stylesheet">
</head>

<body>

<div class="container-fluid page-container">

    <div class="card card-auth p-3 p-md-4 mx-auto" style="max-width:1200px;">

        <h2 class="text-center mb-3">
            Shift Requests
        </h2>

        <div class="row g-2 mb-3">

            <div class="col-12 col-md-4">
                <select id="monthSelect" class="form-select"></select>
            </div>

            <div class="col-12 col-md-4">
                <select id="yearSelect" class="form-select"></select>
            </div>

            <div class="col-12 col-md-4">
                <button
                    type="button"
                    class="btn btn-royal w-100"
                    onclick="renderCalendar()">
                    Show month
                </button>
            </div>

        </div>

        <div id="requestCounter" class="text-center mb-3"></div>

        <div class="table-responsive">
            <table class="table table-bordered calendar-table">
                <thead>
                    <tr class="text-center">
                        <th>Mon</th>
                        <th>Tue</th>
                        <th>Wed</th>
                        <th>Thu</th>
                        <th>Fri</th>
                        <th>Sat</th>
                        <th>Sun</th>
                    </tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>

        <div class="row g-2 mt-3">

            <div class="col-12 col-md-6">
                <button
                    type="button"
                    class="btn btn-royal w-100"
                    onclick="saveRequests()">
                    Save
                </button>
            </div>

            <div class="col-12 col-md-6">
                <a href="dashboard.html" class="btn btn-outline-success w-100">
                    Back
                </a>
            </div>

        </div>

        <div id="msg" class="text-center mt-3"></div>

    </div>

</div>

<script type="module" src="js/requests.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
