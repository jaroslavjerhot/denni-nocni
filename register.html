<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Registration</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="css/style.css"
        rel="stylesheet">

</head>

<body>

<div class="container-fluid page-container">

    <div class="row justify-content-center">

        <div class="col-12 col-xl-10">

            <div class="card card-auth p-4 p-md-5">

                <h2 class="text-center mb-4">
                    Registration
                </h2>

                <!-- EMAIL -->

                <div class="row mb-3">

                    <div class="col-12">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            id="email"
                            type="email"
                            class="form-control"
                            placeholder="name@vfn.cz">

                        <div class="form-text">
                            Only @vfn.cz email addresses are allowed.
                        </div>

                    </div>

                </div>

                <!-- NAME -->

                <div class="row g-2 mb-3">

                    <div class="col-12 col-md-2">

                        <label class="form-label">
                            Prefix
                        </label>

                        <input
                            id="prefix"
                            class="form-control">

                    </div>

                    <div class="col-12 col-md-4">

                        <label class="form-label">
                            Given name
                        </label>

                        <input
                            id="givenname"
                            class="form-control">

                    </div>

                    <div class="col-12 col-md-4">

                        <label class="form-label">
                            Surname
                        </label>

                        <input
                            id="surname"
                            class="form-control">

                    </div>

                    <div class="col-12 col-md-2">

                        <label class="form-label">
                            Suffix
                        </label>

                        <input
                            id="suffix"
                            class="form-control">

                    </div>

                </div>

                <!-- PHONE -->

                <div class="row mb-3">

                    <div class="col-12">

                        <label class="form-label">
                            Phone
                        </label>

                        <input
                            id="phone"
                            class="form-control">

                    </div>

                </div>

                <!-- POSITION -->

                <div class="row mb-3">

                    <div class="col-12">

                        <label class="form-label">
                            Position
                        </label>

                        <select
                            id="position"
                            class="form-select">

                            <option value="">
                                Select position
                            </option>

                            <option value="doctor">
                                Doctor
                            </option>

                            <option value="nurse">
                                Nurse
                            </option>

                            <option value="head_nurse">
                                Head Nurse
                            </option>

                            <option value="admin">
                                Admin
                            </option>

                            <option value="other">
                                Other
                            </option>

                        </select>

                    </div>

                </div>

                <!-- UNFAVORITE -->

                <div class="section-title">
                    Unfavorite colleagues
                </div>

                <div class="row g-2">

                    <div class="col-12 col-md-6">
                        <select id="unfavorite1" class="form-select">
                            <option value="">Colleague 1</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <select id="unfavorite2" class="form-select">
                            <option value="">Colleague 2</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <select id="unfavorite3" class="form-select">
                            <option value="">Colleague 3</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <select id="unfavorite4" class="form-select">
                            <option value="">Colleague 4</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <select id="unfavorite5" class="form-select">
                            <option value="">Colleague 5</option>
                        </select>
                    </div>

                </div>

                <!-- PASSWORD -->

                <div class="section-title">
                    Password
                </div>

                <div class="row g-2 mb-4">

                    <div class="col-12 col-md-6">

                        <input
                            id="password"
                            type="password"
                            class="form-control"
                            placeholder="Password">

                    </div>

                    <div class="col-12 col-md-6">

                        <input
                            id="password2"
                            type="password"
                            class="form-control"
                            placeholder="Repeat password">

                    </div>

                </div>

                <!-- BUTTONS -->

                <div class="row g-2">

                    <div class="col-12 col-md-6">

                        <button
                            type="button"
                            class="btn btn-royal w-100"
                            onclick="registerUser()">

                            Register

                        </button>

                    </div>

                    <div class="col-12 col-md-6">

                        <a
                            href="index.html"
                            class="btn btn-outline-success w-100">

                            Back to Login

                        </a>

                    </div>

                </div>

                <div
                    id="msg"
                    class="text-center mt-3">
                </div>

            </div>

        </div>

    </div>

</div>

<script
    type="module"
    src="js/register.js">
</script>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
